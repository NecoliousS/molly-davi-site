    <style>
        :root {
            --utes-red: #CC0000;
            --utes-black: #000000;
            --utes-white: #FFFFFF;
            --utes-gray: #666666;
            --utes-light-gray: #f5f5f5;
            --utes-dark-red: #990000;
            --bg: #FFFFFF;
            --card-bg: #f8f8f8;
            --text-primary: #111111;
            --text-secondary: #444444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            overflow-x: hidden;
            cursor: none;
        }

        /* Baseball Cursor */
        .cursor {
            width: 24px; height: 24px;
            background: var(--utes-white);
            border-radius: 50%;
            position: fixed; pointer-events: none;
            z-index: 9999;
            transition: transform 0.15s ease, width 0.3s, height 0.3s;
            border: 2px solid var(--utes-red);
            box-shadow: inset -3px -3px 0 rgba(0,0,0,0.1);
        }
        .cursor::before {
            content: '';
            position: absolute;
            top: 50%; left: 0;
            width: 100%; height: 2px;
            background: var(--utes-red);
            transform: translateY(-50%) rotate(45deg);
        }
        .cursor::after {
            content: '';
            position: absolute;
            top: 50%; left: 0;
            width: 100%; height: 2px;
            background: var(--utes-red);
            transform: translateY(-50%) rotate(-45deg);
        }
        .cursor.hover {
            width: 40px; height: 40px;
            background: var(--utes-red);
            border: 2px solid var(--utes-white);
        }
        .cursor.hover::before,
        .cursor.hover::after {
            background: var(--utes-white);
        }

        /* Navigation */
        nav {
            position: fixed; top: 0; left: 0;
            width: 100%; padding: 1.5rem 4rem;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(204,0,0,0.15);
        }
        .nav-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem; color: var(--utes-red);
            text-decoration: none; letter-spacing: 0.05em;
        }
        .nav-logo span { color: var(--text-primary); }
        .nav-links { display: flex; gap: 2.5rem; list-style: none; }
        .nav-links a {
            color: var(--text-primary); text-decoration: none;
            font-size: 0.9rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.1em;
            transition: color 0.3s;
            position: relative;
        }
        .nav-links a::after {
            content: ''; position: absolute; bottom: -4px; left: 0;
            width: 0; height: 2px; background: var(--utes-red);
            transition: width 0.3s;
        }
        .nav-links a:hover { color: var(--utes-red); }
        .nav-links a:hover::after { width: 100%; }

        /* Hero with PNG */
        .hero-story {
            min-height: 60vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center;
            padding: 8rem 4rem 4rem;
            position: relative;
            overflow: hidden;
            background: linear-gradient(180deg, rgba(204,0,0,0.05), transparent);
        }
        .hero-story-png {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0; opacity: 0.06;
            background: url('assets/molly-portrait-png.png') no-repeat center center;
            background-size: contain;
            pointer-events: none;
        }
        .hero-story-content { position: relative; z-index: 1; }
        .hero-story-label {
            font-size: 0.8rem; color: var(--utes-red);
            text-transform: uppercase; letter-spacing: 0.2em;
            font-weight: 700; margin-bottom: 1.5rem;
            opacity: 0;
        }
        .hero-story-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(3rem, 8vw, 6rem);
            color: var(--text-primary);
            letter-spacing: 0.05em;
            opacity: 0;
        }
        .hero-story-quote {
            font-size: 1.3rem; color: var(--utes-gray);
            font-style: italic; max-width: 600px;
            margin: 2rem auto 0;
            line-height: 1.6;
            opacity: 0;
        }

        /* Timeline */
        .timeline-section {
            padding: 6rem 4rem;
            position: relative;
            background: var(--utes-light-gray);
        }
        .timeline {
            max-width: 1000px; margin: 0 auto;
            position: relative;
        }
        .timeline::before {
            content: ''; position: absolute;
            left: 50%; top: 0; width: 2px; height: 100%;
            background: linear-gradient(to bottom, var(--utes-red), transparent);
            transform: translateX(-1px);
        }
        .timeline-item {
            display: flex; justify-content: flex-end;
            padding-right: 50%;
            position: relative;
            margin-bottom: 4rem;
            opacity: 0;
            transform: translateX(-30px);
        }
        .timeline-item:nth-child(even) {
            justify-content: flex-start;
            padding-right: 0; padding-left: 50%;
            transform: translateX(30px);
        }
        .timeline-content {
            background: var(--utes-white);
            border: 1px solid rgba(204,0,0,0.15);
            border-radius: 16px;
            padding: 2rem;
            max-width: 400px;
            position: relative;
            transition: all 0.4s ease;
        }
        .timeline-content:hover {
            border-color: var(--utes-red);
            box-shadow: 0 0 30px rgba(204,0,0,0.15);
            transform: translateY(-5px);
        }
        .timeline-dot {
            position: absolute;
            left: 50%; top: 1.5rem;
            width: 14px; height: 14px;
            background: var(--utes-red);
            border-radius: 50%;
            transform: translateX(-7px);
            box-shadow: 0 0 20px rgba(204,0,0,0.3);
        }
        .timeline-date {
            font-size: 0.8rem; color: var(--utes-red);
            font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.1em; margin-bottom: 0.5rem;
        }
        .timeline-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem; color: var(--text-primary);
            margin-bottom: 0.5rem;
        }
        .timeline-desc {
            font-size: 0.95rem; color: var(--utes-gray);
            line-height: 1.6;
        }

        /* Personality Cards */
        .personality-section {
            padding: 6rem 4rem;
            background: var(--utes-white);
        }
        .personality-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            max-width: 1200px; margin: 0 auto;
        }
        .personality-card {
            background: var(--utes-white);
            border: 1px solid rgba(204,0,0,0.15);
            border-radius: 20px;
            padding: 2.5rem;
            text-align: center;
            transition: all 0.4s ease;
            opacity: 0;
            transform: translateY(40px);
        }
        .personality-card:hover {
            border-color: var(--utes-red);
            box-shadow: 0 0 30px rgba(204,0,0,0.15);
            transform: translateY(-8px);
        }
        .personality-icon {
            font-size: 3rem; margin-bottom: 1.5rem;
        }
        .personality-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem; color: var(--text-primary);
            margin-bottom: 0.75rem;
        }
        .personality-desc {
            font-size: 0.9rem; color: var(--utes-gray);
            line-height: 1.6;
        }

        /* Pre-Game Ritual with PNG */
        .ritual-section {
            padding: 8rem 4rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            background: var(--utes-light-gray);
        }
        .ritual-png {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0; opacity: 0.05;
            background: url('assets/molly-braid-png.png') no-repeat center center;
            background-size: contain;
            pointer-events: none;
        }
        .ritual-content {
            position: relative; z-index: 1;
            max-width: 700px; margin: 0 auto;
        }
